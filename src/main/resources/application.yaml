server:
  port: 8080

spring:
  application:
    name: job-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: postgres
    password: ${POSTGRES_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true


jwt:
  secret: ${JWT_SECRET:default-secret-key-sadfg-sdgsdkvlm-sedfklksng-sdlkfglsrkgjn-sdlkfgsergkn} # :default-secret-key-sadfg-sdgsdkvlm-sedfklksng-sdlkfglsrkgjn-sdlkfgsergkn
  expiration: ${JWT_EXPIRATION:86400000} # :86400000