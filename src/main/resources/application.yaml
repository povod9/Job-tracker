server:
  port: 8080

spring:
  application:
    name: job-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql//localhost:5432/jobtracker}
    name: ${SPRING_DATASOURCE_NAME:postgres}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}