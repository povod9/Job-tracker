server:
  port: 8080


spring:
  application:
    name: job-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobtracker}
    username: ${SPRING_DATASOURCE_USER:postgres}
    password: ${POSTGRES_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
